name: Deploy Databricks GLM Pipeline

on:
  push:
    branches:
      - main
    paths:
      - 'databricks.yml'
      - 'resources/**/*.yml'
      - 'src/**/*.py'

jobs:
  test_and_deploy:
    name: Test & Deploy Pipeline
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      # 1. Set up Python environment on the GitHub Runner
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10' # Match this to your Databricks runtime version
          
      # 2. Install testing dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install black flake8 pytest bandit pandas numpy scikit-learn statsmodels

      # 3. Code Formatting Check (Fails if code isn't formatted correctly)
     # - name: Check formatting with Black
     #   run: black --check src/

      # 4. Linting (Fails if there are syntax errors or undefined names)
      - name: Lint with Flake8
        run: flake8 src/ --count --select=E9,F63,F7,F82 --show-source --statistics

      # 5. Security Scanning
      - name: Security scan with Bandit
        run: bandit -r src/ -ll -ii

      # 6. Unit Testing (Runs any test files in a 'tests/' directory)
      # Note: Create a 'tests' folder and add test_*.py files to use this
      - name: Run Unit Tests with Pytest
        run: pytest tests/ || echo "No tests found or tests failed. Skipping for now."

      # 7. Setup Databricks CLI
      - name: Setup Databricks CLI
        uses: databricks/setup-cli@main

      # 8. Validate Bundle Configuration
      - name: Validate Bundle
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: databricks bundle validate

      # 9. Deploy to Databricks (Only runs if all the steps above passed)
      - name: Deploy Bundle
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: databricks bundle deploy
        
